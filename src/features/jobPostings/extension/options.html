<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Merida Job Capture Options</title>
    <link rel="icon" href="icons/bownarrow-32.png" type="image/png">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div>
          <h1>Options</h1>
          <p id="saveStatus" class="status">Local extension settings</p>
        </div>
      </header>

      <form id="optionsForm" class="reviewForm">
        <label>
          Backend URL
          <input id="backendUrl" name="backendUrl" placeholder="http://127.0.0.1:3217">
        </label>
        <label>
          Capture Token
          <input id="captureToken" name="captureToken" type="password" autocomplete="off">
        </label>
        <button class="primaryButton" type="submit">Save</button>
      </form>
    </main>
    <script src="local-config.js"></script>
    <script src="options.js"></script>
  </body>
</html>
